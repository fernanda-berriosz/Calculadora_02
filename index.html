<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Calculadora de Descuentos Pro ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Deshabilitar las flechas nativas de incremento en inputs numéricos */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        /* Corrección de estilos para el slider en versión Girly */
        input[type=range] {
            -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #ec4899; /* Rosa vibrante */
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 2px 4px rgba(236, 72, 153, 0.3);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #fce7f3; /* Rosa pastel muy claro */
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-pink-50 text-slate-700 min-h-screen flex items-center justify-center md:items-start md:pt-12 p-4 font-sans antialiased">

    <div class="w-full max-w-md md:max-w-4xl bg-white rounded-3xl shadow-xl shadow-pink-100 border border-pink-100 overflow-hidden flex flex-col justify-between select-none">
        
        <div class="p-6 pb-4 border-b border-pink-150 bg-pink-50/30">
            <div class="flex items-center justify-center space-x-2 mb-1">
                <svg class="w-6 h-6 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <h1 class="text-xl font-bold tracking-tight text-pink-600">DescuentoExpress ✨</h1>
            </div>
            <p class="text-xs text-center text-pink-400 font-medium">¡Tu aliada de compras favorita!</p>
        </div>

        <div class="flex border border-pink-100 bg-pink-50/50 p-1 m-4 rounded-xl">
            <button id="tabComparar" onclick="cambiarModo('comparar')" class="flex-1 py-2.5 text-xs font-semibold rounded-lg transition-all duration-200 bg-pink-500 text-white shadow-sm shadow-pink-200">
                ¿Cuánto descuento es?
            </button>
            <button id="tabAplicar" onclick="cambiarModo('aplicar')" class="flex-1 py-2.5 text-xs font-semibold rounded-lg transition-all duration-200 text-pink-400 hover:text-pink-600">
                Aplicar % a precio
            </button>
        </div>

        <div class="p-6 pt-2 grid grid-cols-1 md:grid-cols-2 gap-6 items-start flex-grow">
            
            <div class="space-y-6">
                <div id="modoComparar" class="space-y-4">
                    <div class="relative">
                        <label class="block text-xs font-bold text-pink-400 mb-1.5 uppercase tracking-wider">Precio Original ($)</label>
                        <div class="relative flex items-center">
                            <span class="absolute left-4 text-pink-300 font-semibold text-lg">$</span>
                            <input type="number" id="compOriginal" value="26990" inputmode="decimal" pattern="[0-9]*"
                                class="w-full pl-8 pr-12 py-3.5 bg-pink-50/40 border border-pink-100 rounded-2xl text-lg font-semibold text-slate-800 focus:ring-2 focus:ring-pink-400 focus:border-transparent outline-none transition select-text">
                            <button onclick="limpiarInput('compOriginal')" class="absolute right-3 p-2 text-pink-300 hover:text-pink-500 active:scale-95 transition z-10">
                                <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="relative">
                        <label class="block text-xs font-bold text-pink-400 mb-1.5 uppercase tracking-wider">Precio Rebajado ($)</label>
                        <div class="relative flex items-center">
                            <span class="absolute left-4 text-pink-300 font-semibold text-lg">$</span>
                            <input type="number" id="compRebajado" value="25990" inputmode="decimal" pattern="[0-9]*"
                                class="w-full pl-8 pr-12 py-3.5 bg-pink-50/40 border border-pink-100 rounded-2xl text-lg font-semibold text-slate-800 focus:ring-2 focus:ring-pink-400 focus:border-transparent outline-none transition select-text">
                            <button onclick="limpiarInput('compRebajado')" class="absolute right-3 p-2 text-pink-300 hover:text-pink-500 active:scale-95 transition z-10">
                                <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="modoAplicar" class="space-y-5 hidden">
                    <div class="relative">
                        <label class="block text-xs font-bold text-pink-400 mb-1.5 uppercase tracking-wider">Precio Base ($)</label>
                        <div class="relative flex items-center">
                            <span class="absolute left-4 text-pink-300 font-semibold text-lg">$</span>
                            <input type="number" id="aplBase" value="26990" inputmode="decimal" pattern="[0-9]*"
                                class="w-full pl-8 pr-12 py-3.5 bg-pink-50/40 border border-pink-100 rounded-2xl text-lg font-semibold text-slate-800 focus:ring-2 focus:ring-pink-400 focus:border-transparent outline-none transition select-text">
                            <button onclick="limpiarInput('aplBase')" class="absolute right-3 p-2 text-pink-300 hover:text-pink-500 active:scale-95 transition z-10">
                                <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-xs font-bold text-pink-400 uppercase tracking-wider">Descuento a Aplicar</label>
                            <span id="sliderValor" class="text-pink-500 font-bold text-lg">15%</span>
                        </div>
                        <div class="space-y-3">
                            <input type="range" id="aplPorcentaje" min="1" max="99" value="15" 
                                class="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500">
                            
                            <div class="grid grid-cols-4 gap-2">
                                <button onclick="fijarPorcentaje(10)" class="py-2 text-xs font-semibold bg-pink-100/70 hover:bg-pink-100 text-pink-600 rounded-lg transition">10%</button>
                                <button onclick="fijarPorcentaje(20)" class="py-2 text-xs font-semibold bg-pink-100/70 hover:bg-pink-100 text-pink-600 rounded-lg transition">20%</button>
                                <button onclick="fijarPorcentaje(30)" class="py-2 text-xs font-semibold bg-pink-100/70 hover:bg-pink-100 text-pink-600 rounded-lg transition">30%</button>
                                <button onclick="fijarPorcentaje(50)" class="py-2 text-xs font-semibold bg-pink-100/70 hover:bg-pink-100 text-pink-600 rounded-lg transition">50%</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-pink-50/50 p-5 rounded-2xl border border-pink-100 space-y-4 h-full flex flex-col justify-center">
                <h3 class="text-xs font-bold text-pink-400 uppercase tracking-widest text-center">Resultado del Cálculo</h3>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-4 rounded-xl text-center border border-pink-100 shadow-sm shadow-pink-50">
                        <span id="labelResultado1" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Ahorro real</span>
                        <span id="resValorAhorro" class="text-xl md:text-2xl font-extrabold text-pink-500">$1.000</span>
                    </div>
                    
                    <div class="bg-white p-4 rounded-xl text-center border border-pink-100 shadow-sm shadow-pink-50">
                        <span id="labelResultado2" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Porcentaje</span>
                        <span id="resValorMetrica" class="text-xl md:text-2xl font-extrabold text-fuchsia-500">3.7%</span>
                    </div>
                </div>

                <div id="panelFinalCompra" class="bg-pink-500 p-3.5 rounded-xl text-center border border-transparent shadow-md shadow-pink-200 hidden">
                    <span class="block text-[10px] font-bold text-pink-100 uppercase tracking-wider mb-1">Precio Final a Pagar</span>
                    <span id="resPrecioFinal" class="text-2xl md:text-3xl font-black text-white">$22.942</span>
                </div>
            </div>

        </div>

        <div class="p-4 bg-pink-50/20 text-center border-t border-pink-50 text-pink-300">
            <p class="text-[10px] font-medium">Calcula al instante en tiendas sin conexión a internet ✨</p>
        </div>

    </div>

    <script>
        let modoActual = 'comparar';

        const tabComparar = document.getElementById('tabComparar');
        const tabAplicar = document.getElementById('tabAplicar');
        const modoCompararDiv = document.getElementById('modoComparar');
        const modoAplicarDiv = document.getElementById('modoAplicar');
        const compOriginal = document.getElementById('compOriginal');
        const compRebajado = document.getElementById('compRebajado');
        const aplBase = document.getElementById('aplBase');
        const aplPorcentaje = document.getElementById('aplPorcentaje');
        const sliderValor = document.getElementById('sliderValor');
        const labelResultado1 = document.getElementById('labelResultado1');
        const labelResultado2 = document.getElementById('labelResultado2');
        const resValorAhorro = document.getElementById('resValorAhorro');
        const resValorMetrica = document.getElementById('resValorMetrica');
        const panelFinalCompra = document.getElementById('panelFinalCompra');
        const resPrecioFinal = document.getElementById('resPrecioFinal');

        const formatearMoneda = (valor) => {
            return new Intl.NumberFormat('es-CL', {
                style: 'currency',
                currency: 'CLP',
                minimumFractionDigits: 0
            }).format(valor);
        };

        function cambiarModo(modo) {
            modoActual = modo;
            if (modo === 'comparar') {
                tabComparar.className = "flex-1 py-2.5 text-xs font-semibold rounded-lg transition-all duration-200 bg-pink-500 text-white shadow-sm shadow-pink-200";
                tabAplicar.className = "flex-1 py-2.5 text-xs font-semibold rounded-lg transition-all duration-200 text-pink-400 hover:text-pink-600";
                modoCompararDiv.classList.remove('hidden');
                modoAplicarDiv.classList.add('hidden');
                panelFinalCompra.classList.add('hidden');
                labelResultado1.textContent = "Ahorro real";
                labelResultado2.textContent = "Porcentaje";
            } else {
                tabComparar.className = "flex-1 py-2.5 text-xs font-semibold rounded-lg transition-all duration-200 text-pink-400 hover:text-pink-600";
                tabAplicar.className = "flex-1 py-2.5 text-xs font-semibold rounded-lg transition-all duration-200 bg-pink-500 text-white shadow-sm shadow-pink-200";
                modoCompararDiv.classList.add('hidden');
                modoAplicarDiv.classList.remove('hidden');
                panelFinalCompra.classList.remove('hidden');
                labelResultado1.textContent = "Descuento ($)";
                labelResultado2.textContent = "Descuento (%)";
            }
            ejecutarCalculos();
        }

        function ejecutarCalculos() {
            if (modoActual === 'comparar') {
                const original = parseFloat(compOriginal.value) || 0;
                const rebajado = parseFloat(compRebajado.value) || 0;

                if (original <= 0 || rebajado < 0) {
                    resValorAhorro.textContent = "$0";
                    resValorMetrica.textContent = "0%";
                    return;
                }

                const ahorro = original - rebajado;
                const porcentaje = (ahorro / original) * 100;

                resValorAhorro.textContent = formatearMoneda(ahorro);
                resValorMetrica.textContent = `${porcentaje > 0 ? porcentaje.toFixed(1) : 0}%`;

            } else {
                const base = parseFloat(aplBase.value) || 0;
                const pct = parseFloat(aplPorcentaje.value) || 0;
                sliderValor.textContent = `${pct}%`;

                if (base <= 0) {
                    resValorAhorro.textContent = "$0";
                    resValorMetrica.textContent = "0%";
                    resPrecioFinal.textContent = "$0";
                    return;
                }

                const ahorro = base * (pct / 100);
                const precioFinal = base - ahorro;

                resValorAhorro.textContent = formatearMoneda(ahorro);
                resValorMetrica.textContent = `${pct}%`;
                resPrecioFinal.textContent = formatearMoneda(precioFinal);
            }
        }

        function limpiarInput(id) {
            const input = document.getElementById(id);
            input.value = '';
            input.focus();
            ejecutarCalculos();
        }

        function fijarPorcentaje(valor) {
            aplPorcentaje.value = valor;
            ejecutarCalculos();
        }

        compOriginal.addEventListener('input', ejecutarCalculos);
        compRebajado.addEventListener('input', ejecutarCalculos);
        aplBase.addEventListener('input', ejecutarCalculos);
        aplPorcentaje.addEventListener('input', ejecutarCalculos);

        ejecutarCalculos();
    </script>
</body>
</html>
